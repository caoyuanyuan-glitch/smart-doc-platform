# Smart Doc Platform - Nginx 配置
# 部署路径: /etc/nginx/sites-available/smart-doc-platform
# 启用: ln -s /etc/nginx/sites-available/smart-doc-platform /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name _;

    # 文件上传大小限制
    client_max_body_size 200M;

    # 前端静态文件
    root /opt/smart-doc-platform/frontend/dist;
    index index.html;

    # SPA 路由回退 (Vue Router history 模式)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 反向代理
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # AI 操作超时设置 (润色/审核可能耗时较长)
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 60s;

        # 支持流式响应
        proxy_buffering off;
        proxy_http_version 1.1;
    }

    # 后端静态文件 (上传文件、知识库附件)
    location /static/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 日志
    access_log /var/log/nginx/smart-doc-platform.access.log;
    error_log /var/log/nginx/smart-doc-platform.error.log;
}
